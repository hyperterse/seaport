name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: seaport
          - os: macos-13
            target: x86_64-apple-darwin
            binary: seaport
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: seaport
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: seaport.exe

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release binary
        run: cargo build --release --locked --target "${{ matrix.target }}"
        shell: bash
      - name: Package artifact
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          target="${{ matrix.target }}"
          archive="seaport-${version}-${target}.tar.gz"
          mkdir -p "dist/seaport-${version}-${target}"
          cp "target/${target}/release/${{ matrix.binary }}" "dist/seaport-${version}-${target}/"
          tar -czf "${archive}" -C dist "seaport-${version}-${target}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${archive}" > "${archive}.sha256"
          else
            shasum -a 256 "${archive}" > "${archive}.sha256"
          fi
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: seaport-${{ matrix.target }}
          path: |
            seaport-*.tar.gz
            seaport-*.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Build checksum manifest
        run: |
          set -euo pipefail
          find release-artifacts -name '*.sha256' -print0 \
            | sort -z \
            | xargs -0 cat > checksums.txt
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" release-artifacts/*.tar.gz checksums.txt --clobber
          else
            gh release create "${TAG}" release-artifacts/*.tar.gz checksums.txt \
              --title "Seaport ${TAG}" \
              --notes "Seaport ${TAG} release."
          fi
