name: release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install release tooling
        run: bun install

      - name: Require branch dispatch
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" != "branch" ]]; then
            echo "Release workflow must be run from a branch, not ${GITHUB_REF_TYPE}."
            exit 1
          fi

      - name: Get GitHub App user ID
        id: app-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          user_id="$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)"
          echo "user-id=${user_id}" >> "$GITHUB_OUTPUT"

      - name: Configure GitHub App git identity
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.app-user.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          gh auth setup-git

      - name: Prepare release commit and tag
        id: release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: bun run release:prepare

      - name: Upload release notes
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: error

  build:
    name: build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: seaport
          - os: macos-13
            target: x86_64-apple-darwin
            binary: seaport
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: seaport
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: seaport.exe

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target "${{ matrix.target }}"
        shell: bash

      - name: Verify release version
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          expected="seaport ${{ needs.prepare.outputs.version }}"
          version="$("${binary}" --version)"
          short_version="$("${binary}" -v)"

          if [[ "${version}" != "${expected}" ]]; then
            echo "Expected --version to print '${expected}', got '${version}'."
            exit 1
          fi

          if [[ "${short_version}" != "${expected}" ]]; then
            echo "Expected -v to print '${expected}', got '${short_version}'."
            exit 1
          fi
        shell: bash

      - name: Package artifact
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          target="${{ matrix.target }}"
          archive="seaport-${version}-${target}.tar.gz"
          package_dir="seaport-${version}-${target}"

          mkdir -p "dist/${package_dir}"
          cp "target/${target}/release/${{ matrix.binary }}" "dist/${package_dir}/"
          tar -czf "${archive}" -C dist "${package_dir}"

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${archive}" > "${archive}.sha256"
          else
            shasum -a 256 "${archive}" > "${archive}.sha256"
          fi
        shell: bash

      - uses: actions/upload-artifact@v7
        with:
          name: seaport-${{ matrix.target }}
          path: |
            seaport-*.tar.gz
            seaport-*.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: publish release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_PRIVATE_KEY }}
          permission-contents: write

      - uses: actions/download-artifact@v8
        with:
          name: release-notes
          path: release-notes

      - uses: actions/download-artifact@v8
        with:
          pattern: seaport-*
          path: release-artifacts
          merge-multiple: true

      - name: Build checksum manifest
        run: |
          set -euo pipefail
          find release-artifacts -name '*.sha256' -print0 \
            | sort -z \
            | xargs -0 cat > checksums.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          assets=(release-artifacts/*.tar.gz release-artifacts/*.tar.gz.sha256 checksums.txt)

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${assets[@]}" --clobber
            gh release edit "${TAG}" \
              --title "${TAG}" \
              --notes-file release-notes/release-notes.md
          else
            gh release create "${TAG}" "${assets[@]}" \
              --title "${TAG}" \
              --notes-file release-notes/release-notes.md
          fi
