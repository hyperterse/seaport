name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all-targets --locked
      - run: cargo test --doc --locked
      - run: bash -n install.sh
      - run: bash -n benchmarks/compare.sh
      - run: PYTHONPYCACHEPREFIX=/tmp/seaport-pycache python3 -m py_compile benchmarks/run.py
      - run: cargo run -- --help
      - run: test -f examples/tasks/basic-evaluation/task.toml
        shell: bash
      - run: test -x examples/tasks/basic-evaluation/solution/solve.sh
        shell: bash
      - run: test -x examples/tasks/basic-evaluation/tests/test.sh
        shell: bash
      - run: test -f benchmarks/tasks/basic-oracle/task.toml
        shell: bash
      - run: test -x benchmarks/tasks/basic-oracle/solution/solve.sh
        shell: bash
      - run: test -x benchmarks/tasks/basic-oracle/tests/test.sh
        shell: bash

  benchmark:
    name: benchmark smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo bench --bench evaluation
