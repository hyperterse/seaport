name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all-targets
      - run: cargo test --doc
      - run: cargo run -- --help
      - run: test -f examples/tasks/basic-evaluation/task.toml
      - run: test -x examples/tasks/basic-evaluation/solution/solve.sh
      - run: test -x examples/tasks/basic-evaluation/tests/test.sh
      - run: cargo bench --bench evaluation
