name: benchmark

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: Dataset to benchmark with `run -d <dataset>`.
        required: true
        default: factory-ai/legacy-bench
      iterations:
        description: Number of runs per tool.
        required: true
        default: "10"
      extra_args:
        description: Optional extra arguments appended after `run -d <dataset>`.
        required: false
        default: ""

permissions:
  contents: read

jobs:
  compare:
    name: compare seaport and harbor
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Seaport
        run: cargo build --release --locked

      - name: Install Harbor
        run: |
          set -euo pipefail
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user harbor
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Check tools
        run: |
          set -euo pipefail
          ./target/release/seaport --help
          harbor --help

      - name: Run benchmark
        env:
          BENCH_DATASET: ${{ inputs.dataset }}
          BENCH_EXTRA_ARGS: ${{ inputs.extra_args }}
          SEAPORT_BENCH_ITERATIONS: ${{ inputs.iterations }}
          SEAPORT_BENCH_OUTPUT_DIR: benchmarks/results/github-action
        run: |
          set -euo pipefail
          args=(run -d "$BENCH_DATASET")

          if [[ -n "$BENCH_EXTRA_ARGS" ]]; then
            # shellcheck disable=SC2206
            extra_args=( $BENCH_EXTRA_ARGS )
            args+=("${extra_args[@]}")
          fi

          ./benchmarks/compare.sh "${args[@]}"

      - name: Upload benchmark logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seaport-harbor-benchmark
          path: benchmarks/results/github-action/
          if-no-files-found: ignore
